<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 1 - Traslación 3D</title>
    <style>
        /* Reset para un diseño minimalista a pantalla completa */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        body { 
            overflow: hidden; /* Evita barras de desplazamiento */
            background-color: #050505; /* Fondo oscuro profesional */
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // 1. CREAR LA ESCENA
        const scene = new THREE.Scene();
        
        // 2. CREAR LA CÁMARA
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;
        
        // 3. CREAR EL RENDERIZADOR
        const renderer = new THREE.WebGLRenderer({ antialias: true }); // Antialias para bordes definidos
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 4. CREAR EL OBJETO (Cubo)
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        // Material básico con un tono verde neón para que resalte
        const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 }); 
        const cubo = new THREE.Mesh(geometry, material);
        scene.add(cubo);

        // 5. LÓGICA DE TRASLACIÓN (Variables de control)
        let direccion = 0.04; // Velocidad de desplazamiento

        // 6. FUNCIÓN DE ANIMACIÓN
        function animate() {
            requestAnimationFrame(animate);
            
            // Mover el cubo en el eje X
            cubo.position.x += direccion;
            
            // Lógica de límites: Si llega a 3 o -3, invierte la dirección (rebote)
            if (cubo.position.x > 3 || cubo.position.x < -3) {
                direccion = -direccion;
            }
            
            // Dibujar la escena
            renderer.render(scene, camera);
        }
        
        // Iniciar el bucle de animación
        animate();

        // 7. RESPONSIVIDAD (Ajuste si se redimensiona la ventana)
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
