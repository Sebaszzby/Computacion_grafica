<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 1: Gráfico de Barras Dinámico</title>
    <style>
        /* Fondo moderno y fuente limpia */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
            color: #333;
        }

        /* Contenedor tipo "tarjeta" (Card) flotante */
        #contenedor-grafico {
            display: flex;
            align-items: flex-end;
            height: 300px;
            background-color: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); /* Sombra suave */
            gap: 20px;
        }

        /* Estilo moderno para las barras */
        .barra {
            width: 50px;
            /* Degradado azul profesional */
            background: linear-gradient(to top, #0072ff 0%, #00c6ff 100%);
            border-radius: 8px 8px 0 0; /* Solo bordes superiores redondeados */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1); /* Animación más fluida y natural */
            display: flex;
            justify-content: center;
            align-items: flex-end;
            color: white;
            font-weight: bold;
            padding-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3); /* Sombra en el texto para mejor lectura */
        }
    </style>
</head>
<body>

    <h2>Gráfico de Rendimiento en Tiempo Real</h2>
    
    <div id="contenedor-grafico">
        <div class="barra" id="barra-1">0</div>
        <div class="barra" id="barra-2">0</div>
        <div class="barra" id="barra-3">0</div>
        <div class="barra" id="barra-4">0</div>
        <div class="barra" id="barra-5">0</div>
    </div>

    <script>
        function generarAleatorio(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function actualizarGrafico() {
            for (let i = 1; i <= 5; i++) {
                const barra = document.getElementById(`barra-${i}`);
                const nuevoValor = generarAleatorio(10, 100);
                
                barra.style.height = (nuevoValor * 2.5) + "px";
                barra.innerText = nuevoValor;
            }
        }

        actualizarGrafico();
        setInterval(actualizarGrafico, 1000);
    </script>

</body>
</html>
