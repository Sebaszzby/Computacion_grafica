<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2: Puntos en Movimiento</title>
    <style>
        /* Estilos generales y fondo moderno */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
            color: #333;
        }

        /* Contenedor tipo tarjeta flotante */
        #contenedor-grafico {
            background-color: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Estilo del Canvas: Fondo oscuro para que los puntos resalten */
        canvas {
            background-color: #1e1e2f; /* Azul muy oscuro casi negro */
            border-radius: 12px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.5);
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="contenedor-grafico">
        <h2>Gráfico de Puntos Dinámicos</h2>
        <p style="color: #666; margin-bottom: 15px;">Actualización en tiempo real (cada segundo)</p>
        
        <canvas id="myCanvas" width="600" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("myCanvas");
        const ctx = canvas.getContext("2d");

        // Array para guardar la información de nuestros 5 puntos
        // Cada punto tiene un color "neón" diferente para el diseño Pro
        const puntos = [
            { x: 0, y: 0, color: "#00d2ff" }, // Cyan
            { x: 0, y: 0, color: "#ff0099" }, // Magenta
            { x: 0, y: 0, color: "#00ff87" }, // Verde lima
            { x: 0, y: 0, color: "#fbd786" }, // Amarillo pastel
            { x: 0, y: 0, color: "#b92b27" }  // Rojo
        ];

        const radio = 8; // Tamaño de los puntos

        // Función para dibujar una cruz sutil en el fondo (Plano Cartesiano)
        function dibujarPlano() {
            ctx.beginPath();
            ctx.strokeStyle = "rgba(255, 255, 255, 0.1)"; // Blanco casi transparente
            ctx.lineWidth = 1;
            
            // Eje X
            ctx.moveTo(0, canvas.height / 2);
            ctx.lineTo(canvas.width, canvas.height / 2);
            // Eje Y
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            
            ctx.stroke();
        }

        // Función principal que actualiza y dibuja todo
        function actualizarGrafico() {
            // 1. LIMPIAR: Usamos clearRect para borrar el lienzo anterior
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 2. DIBUJAR PLANO: Redibujamos las líneas de fondo
            dibujarPlano();

            // 3. ACTUALIZAR Y DIBUJAR PUNTOS
            for (let i = 0; i < puntos.length; i++) {
                // Generamos nuevas coordenadas aleatorias (restando el radio para que no se salgan del borde)
                puntos[i].x = Math.random() * (canvas.width - radio * 2) + radio;
                puntos[i].y = Math.random() * (canvas.height - radio * 2) + radio;

                // Empezamos a dibujar el círculo
                ctx.beginPath();
                ctx.arc(puntos[i].x, puntos[i].y, radio, 0, Math.PI * 2);
                
                // Efecto "Pro": Sombra brillante (Glow)
                ctx.fillStyle = puntos[i].color;
                ctx.shadowColor = puntos[i].color;
                ctx.shadowBlur = 15; // Intensidad del brillo
                
                // Rellenamos el punto
                ctx.fill();
                
                // Reseteamos la sombra para que no afecte a otras cosas
                ctx.shadowBlur = 0; 
            }
        }

        // Ejecutamos una vez al inicio para que no empiece vacío
        actualizarGrafico();

        // Usamos setInterval para que el proceso se repita cada 1000 ms (1 segundo)
        setInterval(actualizarGrafico, 1000);

    </script>

</body>
</html>
