<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 1 - Traslación 3D Premium</title>
    <style>
        /* Reset de estilos */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body { 
            overflow: hidden; 
            background-color: #030303; /* Fondo extra oscuro para resaltar el neón */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Panel flotante estilo Glassmorphism */
        .glass-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 0, 0.2);
            border-radius: 16px;
            padding: 20px 40px;
            color: #ffffff;
            text-align: center;
            box-shadow: 0 4px 30px rgba(0, 255, 0, 0.05);
            pointer-events: none; /* Para no interferir con la escena */
        }

        .glass-panel h1 {
            font-size: 1.1rem;
            font-weight: 500;
            color: #00ff00; /* Acento verde neón */
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .glass-panel p {
            font-size: 0.85rem;
            color: #a0a0a0;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h1>Ejercicio 01</h1>
        <p>Desplazamiento lineal en el espacio tridimensional (Eje X)</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // 1. CREAR LA ESCENA
        const scene = new THREE.Scene();
        // Añadir una niebla sutil para dar profundidad infinita
        scene.fog = new THREE.FogExp2(0x030303, 0.08);

        // 2. CREAR LA CÁMARA
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 6); // Cámara ligeramente elevada para ver la cuadrícula
        camera.lookAt(0, 0, 0);

        // 3. CREAR EL RENDERIZADOR
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // Mejora la nitidez en pantallas de alta resolución
        document.body.appendChild(renderer.domElement);

        // 4. ILUMINACIÓN PROFESIONAL
        // Luz ambiental suave
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambientLight);
        // Luz direccional principal
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);
        // Luz de acento verde
        const greenLight = new THREE.PointLight(0x00ff00, 2, 10);
        greenLight.position.set(0, 0, 2);
        scene.add(greenLight);

        // 5. ENTORNO: CUADRÍCULA (Grid)
        // Crea un aspecto de "plano de trabajo" técnico
        const gridHelper = new THREE.GridHelper(20, 20, 0x00ff00, 0x222222);
        gridHelper.position.y = -0.6; // Bajar un poco la cuadrícula
        // Hacer la cuadrícula ligeramente transparente
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.5;
        scene.add(gridHelper);

        // 6. CREAR EL OBJETO (Cubo Premium)
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        
        // Material base oscuro y reflectante
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x111111,
            roughness: 0.2,
            metalness: 0.8
        });
        const cubo = new THREE.Mesh(geometry, material);

        // Añadir bordes de color verde neón para definir la figura
        const edgesGeometry = new THREE.EdgesGeometry(geometry);
        const edgesMaterial = new THREE.LineBasicMaterial({ 
            color: 0x00ff00, 
            linewidth: 2 
        });
        const cubeEdges = new THREE.LineSegments(edgesGeometry, edgesMaterial);
        cubo.add(cubeEdges); // Los bordes se añaden como hijos del cubo
        
        scene.add(cubo);

        // 7. LÓGICA DE TRASLACIÓN
        let direccion = 0.03; // Velocidad ligeramente más suave

        // 8. FUNCIÓN DE ANIMACIÓN
        function animate() {
            requestAnimationFrame(animate);
            
            // Mover el cubo en el eje X
            cubo.position.x += direccion;
            
            // Lógica de límites
            if (cubo.position.x > 3 || cubo.position.x < -3) {
                direccion = -direccion;
            }

            // Una rotación extremadamente sutil en Y e Z para darle más dinamismo visual
            cubo.rotation.y += 0.005;
            cubo.rotation.z += 0.002;
            
            // Dibujar la escena
            renderer.render(scene, camera);
        }
        
        animate();

        // 9. RESPONSIVIDAD
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
