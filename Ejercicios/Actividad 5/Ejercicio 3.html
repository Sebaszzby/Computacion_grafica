<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 3 - Transformaciones Interactivas Premium</title>
    <style>
        /* Reset de estilos */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body { 
            overflow: hidden; 
            background-color: #030303; /* Fondo extra oscuro */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Panel de instrucciones estilo Glassmorphism */
        .glass-panel {
            position: absolute;
            top: 24px;
            left: 24px;
            background: rgba(15, 15, 15, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 0, 0.2);
            border-radius: 16px;
            padding: 24px;
            color: #ffffff;
            box-shadow: 0 4px 30px rgba(0, 255, 0, 0.05);
            pointer-events: none; /* No interfiere con el canvas */
            min-width: 280px;
        }

        .glass-panel h1 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #00ff00;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(0, 255, 0, 0.2);
            padding-bottom: 8px;
        }

        .glass-panel ul {
            list-style: none;
        }

        .glass-panel li {
            font-size: 0.85rem;
            color: #a0a0a0;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Estilo para simular teclas físicas */
        .key {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #00ff00;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.8rem;
            font-weight: bold;
            box-shadow: 0 2px 0 #000;
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <h1>Control 3D</h1>
        <ul>
            <li><span>Traslación (Mover)</span> <div><span class="key">↑</span> <span class="key">↓</span> <span class="key">←</span> <span class="key">→</span></div></li>
            <li><span>Rotación Eje X</span> <div><span class="key">I</span> <span class="key">K</span></div></li>
            <li><span>Rotación Eje Y</span> <div><span class="key">J</span> <span class="key">L</span></div></li>
            <li><span>Escalado (Tamaño)</span> <div><span class="key">W</span> <span class="key">S</span></div></li>
            <li><span>Restablecer</span> <div><span class="key">R</span></div></li>
        </ul>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // 1. CREAR LA ESCENA
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x030303, 0.05);

        // 2. CREAR LA CÁMARA
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 8); 
        camera.lookAt(0, 0, 0);

        // 3. RENDERIZADOR
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 4. ILUMINACIÓN
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);
        
        const greenLight = new THREE.PointLight(0x00ff00, 2.5, 15);
        greenLight.position.set(0, 0, 3);
        scene.add(greenLight);

        // 5. ENTORNO: CUADRÍCULA
        const gridHelper = new THREE.GridHelper(30, 30, 0x00ff00, 0x111111);
        gridHelper.position.y = -2; 
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.3;
        scene.add(gridHelper);

        // 6. CREAR EL OBJETO (Cubo de Cristal Premium)
        const geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
        
        const material = new THREE.MeshPhysicalMaterial({ 
            color: 0x080808,
            metalness: 0.9,
            roughness: 0.1,
            transparent: true,
            opacity: 0.8,
            side: THREE.DoubleSide
        });
        const cubo = new THREE.Mesh(geometry, material);

        // Añadir bordes verde neón
        const edgesGeometry = new THREE.EdgesGeometry(geometry);
        const edgesMaterial = new THREE.LineBasicMaterial({ color: 0x00ff00, linewidth: 2 });
        const cubeEdges = new THREE.LineSegments(edgesGeometry, edgesMaterial);
        cubo.add(cubeEdges); 
        
        scene.add(cubo);

        // 7. VARIABLES DE TRANSFORMACIÓN
        const velTraslacion = 0.15;
        const velRotacion = 0.1;
        const velEscalado = 0.1;

        // 8. CONTROLADORES DE EVENTOS (TECLADO)
        document.addEventListener('keydown', (event) => {
            const tecla = event.key.toLowerCase();

            switch(tecla) {
                // TRASLACIÓN
                case 'arrowup':    cubo.position.y += velTraslacion; break;
                case 'arrowdown':  cubo.position.y -= velTraslacion; break;
                case 'arrowright': cubo.position.x += velTraslacion; break;
                case 'arrowleft':  cubo.position.x -= velTraslacion; break;

                // ROTACIÓN
                case 'i': cubo.rotation.x -= velRotacion; break;
                case 'k': cubo.rotation.x += velRotacion; break;
                case 'j': cubo.rotation.y -= velRotacion; break;
                case 'l': cubo.rotation.y += velRotacion; break;

                // ESCALADO
                case 'w':
                    cubo.scale.x += velEscalado;
                    cubo.scale.y += velEscalado;
                    cubo.scale.z += velEscalado;
                    break;
                case 's':
                    if (cubo.scale.x > 0.3) { // Evitar que se haga demasiado pequeño o negativo
                        cubo.scale.x -= velEscalado;
                        cubo.scale.y -= velEscalado;
                        cubo.scale.z -= velEscalado;
                    }
                    break;

                // RESET
                case 'r':
                    cubo.position.set(0, 0, 0);
                    cubo.rotation.set(0, 0, 0);
                    cubo.scale.set(1, 1, 1);
                    break;
            }
        });

        // 9. FUNCIÓN DE ANIMACIÓN
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        
        animate();

        // 10. RESPONSIVIDAD
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
