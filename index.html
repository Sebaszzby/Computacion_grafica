<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio | Computación Gráfica</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2300e5a0'/%3E%3Cstop offset='1' stop-color='%2300b8ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='7' fill='%2307111a'/%3E%3Crect x='1' y='1' width='30' height='30' rx='6.5' fill='none' stroke='url(%23g)' stroke-width='.8' opacity='.5'/%3E%3Ctext x='50%25' y='52%25' dominant-baseline='middle' text-anchor='middle' font-family='monospace' font-weight='700' font-size='12' fill='url(%23g)'%3ECG%3C/text%3E%3C/svg%3E">

    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

    <!-- ══ PRELOADER ══ -->
    <div id="preloader">
        <div class="terminal">
            <div class="term-bar">
                <div class="term-dots">
                    <div class="term-dot red"></div>
                    <div class="term-dot yellow"></div>
                    <div class="term-dot green"></div>
                </div>
                <span class="term-path">~/portafolio/<em>computacion-grafica</em></span>
            </div>
            <div class="term-body" id="term-body"></div>
            <div class="term-footer">
                <span class="prog-status" id="prog-status">Iniciando...</span>
                <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
                <span class="prog-num" id="prog-num">0%</span>
            </div>
        </div>
    </div>

    <!-- ══ VIDEO DE FONDO ══ -->
    <div class="video-zona">
        <div class="overlay"></div>
        <div class="video-slide active">
            <video id="vid0" autoplay muted loop playsinline>
                <source src="assets/dota2.mp4" type="video/mp4">
            </video>
        </div>
        <div class="video-slide">
            <video muted loop playsinline>
                <source src="assets/dotadragon.mp4" type="video/mp4">
            </video>
        </div>
        <div class="video-slide">
            <video muted loop playsinline>
                <source src="assets/scarface.mp4" type="video/mp4">
            </video>
        </div>
        <div class="fade-top"></div>
        <div class="fade-bot"></div>
    </div>

    <!-- ══ SLOTS — se rellenan por app.js ══ -->
    <div id="slot-header"></div>
    <div id="slot-hero"></div>
    <div id="slot-clases"></div>
    <div id="slot-actividades"></div>
    <div id="slot-footer"></div>
    <div id="slot-modals"></div>

    <!-- ══ SCRIPTS ══ -->
    <script src="assets/preloader.js"></script>
    <script src="assets/app.js"></script>

</body>
</html>
